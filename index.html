<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>TRAVEL Planning</title>
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#1a7aa8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<!-- Firebase compat版（通常scriptで動作） -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

:root {
  --sky1:   #c8edfa;
  --sky2:   #8ed8f5;
  --sea1:   #5bbfe0;
  --sea2:   #2ea3cc;
  --deep:   #1a7aa8;
  --white:  #ffffff;
  --glass:  rgba(255,255,255,0.38);
  --glassborder: rgba(255,255,255,0.65);
  --shadow: 0 6px 28px rgba(30,120,170,0.18);
  --text:   #1a4a60;
  --textsub:#4a8aaa;
  --r: 20px;
  --app-width: 480px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ① 背景が切れないよう html/body 両方に固定背景 */
html {
  min-height: 100%;
  background-color: #1a7aa8;
  background-image: linear-gradient(170deg,
    var(--sky1) 0%, var(--sky2) 28%,
    var(--sea1) 60%, var(--sea2) 82%,
    var(--deep) 100%);
  background-attachment: fixed;
  background-size: 100% 100vh;
}
html::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background: linear-gradient(170deg,
    #c8edfa 0%, #8ed8f5 28%,
    #5bbfe0 60%, #2ea3cc 82%,
    #1a7aa8 100%);
}

/* PC表示時の両サイド装飾 */
@media (min-width: 520px) {
  html::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(ellipse at 15% 35%, rgba(255,255,255,0.22) 0%, transparent 48%),
      radial-gradient(ellipse at 85% 72%, rgba(26,122,168,0.18) 0%, transparent 48%);
    pointer-events: none;
  }
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100dvh;
  background: transparent;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ===== HEADER ===== */
/* PC・スマホ共通：最大幅480pxで中央寄せ */
.hdr {
  position: fixed;
  top: 0;
  left: 50%;
  right: auto;
  transform: translateX(-50%);
  z-index: 100;
  width: 100%;
  max-width: var(--app-width);
  background: rgba(255,255,255,0.52);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.7);
  border-top: none;
  border-radius: 0 0 18px 18px;
  box-shadow: 0 4px 32px rgba(30,120,170,0.18);
  padding-top: env(safe-area-inset-top, 0px);
}

/* タイトル行 */
.hdr-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px 0;
  gap: 8px;
}

.logo {
  font-family: 'Nunito', sans-serif;
  font-size: 1.05rem;
  font-weight: 800;
  color: var(--deep);
  letter-spacing: 0.08em;
  white-space: nowrap;
}
.logo em {
  font-style: italic;
  color: var(--sea1);
  font-size: 0.9em;
  letter-spacing: 0.04em;
}

/* 概要バー */
.overview-bar {
  margin: 0;
  background: rgba(255,255,255,0.45);
  border: 1.5px solid rgba(255,255,255,0.78);
  border-radius: 14px;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}
.overview-bar:active { background: rgba(255,255,255,0.62); }

.ov-dest {
  font-family: 'Nunito', sans-serif;
  font-size: 0.88rem;
  font-weight: 800;
  color: var(--deep);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
  max-width: 48%;
}
.ov-divider {
  width: 1px;
  height: 14px;
  background: rgba(30,120,170,0.25);
  flex-shrink: 0;
}
.ov-dates {
  font-family: 'Nunito', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--textsub);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.ov-left, .ov-right, .ov-members, .ov-hotel, .ov-edit { display: none; }

.btn-pdf {
  background: linear-gradient(135deg, var(--sea1), var(--sea2));
  border: none;
  border-radius: 50px;
  padding: 7px 13px;
  color: white;
  font-family: 'Nunito', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 3px 12px rgba(46,163,204,0.35);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-pdf:active { transform: scale(0.95); }

/* タブ：ガラス調 */
.tab-bar {
  display: flex;
  padding: 6px 14px 10px;
  gap: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 50px;
  margin: 6px 14px 0;
  padding: 5px;
}
.tab-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 8px 4px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 40px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.18s;
  -webkit-tap-highlight-color: transparent;
  background: transparent;
  color: rgba(255,255,255,0.55);
  white-space: nowrap;
}
.tab-btn.active {
  background: rgba(59,172,210,0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-color: rgba(255,255,255,0.3);
  color: #fff;
  box-shadow: 0 2px 12px rgba(59,172,210,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
}
.tab-btn .t-ico { font-size: 1.1rem; line-height: 1; }

/* ===== スクロールエリア：中央寄せ ===== */
.scroll-area {
  padding-top: 148px; /* fallback: JS で上書き */
  padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
  min-height: 100dvh;
  max-width: var(--app-width);
  margin-left: auto;
  margin-right: auto;
  padding-left: 14px;
  padding-right: 14px;
}

/* ===== PANELS ===== */
.panel { display: none; padding-top: 12px; }
.panel.active { display: block; }

/* ===== GLASS CARD ===== */
.g-card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1.5px solid var(--glassborder);
  border-radius: var(--r);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
}

/* ===== INPUTS ===== */
.f-inp {
  width: 100%;
  background: rgba(255,255,255,0.55);
  border: 1.5px solid rgba(255,255,255,0.8);
  border-radius: 12px;
  padding: 11px 14px;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.88rem;
  outline: none;
  transition: border-color 0.18s, background 0.18s;
  -webkit-appearance: none;
}
.f-inp::placeholder { color: rgba(30,100,140,0.38); }
.f-inp:focus { border-color: var(--sea1); background: rgba(255,255,255,0.75); }

.l-inp {
  background: transparent;
  border: none;
  border-bottom: 1.5px solid rgba(30,120,170,0.2);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px;
  outline: none;
  padding: 4px 2px;
  width: 100%;
  transition: border-color 0.18s;
  line-height: 1.5;
}
.l-inp::placeholder { color: rgba(30,100,140,0.32); }
.l-inp:focus { border-color: var(--sea1); }

/* ===== BUTTONS ===== */
.btn-add {
  background: rgba(255,255,255,0.6);
  border: 1.5px solid rgba(255,255,255,0.9);
  border-radius: 50px;
  padding: 10px 20px;
  color: var(--deep);
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
  min-height: 44px;
  box-shadow: 0 2px 10px rgba(30,120,170,0.1);
}
.btn-add:active { background: rgba(255,255,255,0.85); }

.btn-del {
  background: rgba(255,255,255,0.45);
  border: 1px solid rgba(30,120,170,0.15);
  border-radius: 50%;
  width: 32px; height: 32px; min-width: 32px;
  color: var(--textsub);
  cursor: pointer;
  font-size: 0.95rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-del:active { background: rgba(255,100,100,0.15); color: #cc4444; }

/* ===== MODAL ===== */
.modal-ov {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(10,60,90,0.45);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  align-items: flex-end;
  justify-content: center;
}
.modal-ov.open { display: flex; }
.modal-sheet {
  background: linear-gradient(160deg, #e8f8fd 0%, #caf0fa 100%);
  border: 1.5px solid rgba(255,255,255,0.8);
  border-radius: 28px 28px 0 0;
  padding: 18px 18px calc(32px + env(safe-area-inset-bottom,0px));
  width: 100%; max-width: var(--app-width);
  animation: su .28s cubic-bezier(.34,1.3,.64,1);
  max-height: 90dvh;
  overflow-y: auto;
}
@keyframes su { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-handle { width:40px;height:4px;background:rgba(30,120,170,0.2);border-radius:2px;margin:0 auto 16px; }
.modal-title { font-family:'Nunito',sans-serif;font-weight:800;font-size:1.05rem;color:var(--deep);margin-bottom:14px; }
.modal-fields { display:flex;flex-direction:column;gap:10px; }
.modal-field label { display:block;font-size:0.68rem;font-weight:600;color:var(--textsub);letter-spacing:0.07em;margin-bottom:4px;text-transform:uppercase; }
.modal-btm { display:flex;justify-content:flex-end;margin-top:16px; }
.btn-done {
  background: linear-gradient(135deg, var(--sea1), var(--sea2));
  border: none; border-radius: 50px;
  padding: 12px 30px; color: white;
  font-family: 'Nunito', sans-serif;
  font-size: 0.92rem; font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(46,163,204,0.35);
  min-height: 44px;
  -webkit-tap-highlight-color: transparent;
}
.btn-done:active { opacity: 0.85; }

/* ===== 日程表 ===== */
.day-scroll {
  display: flex; gap: 7px;
  overflow-x: auto;
  padding: 2px 2px 8px;
  margin-bottom: 6px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.day-scroll::-webkit-scrollbar { display: none; }

.day-chip {
  flex-shrink: 0;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 50px;
  padding: 8px 18px;
  color: rgba(255,255,255,0.6);
  font-family: 'Nunito', sans-serif;
  font-size: 0.82rem; font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  min-height: 38px; display: flex; align-items: center;
}
.day-chip.active {
  background: rgba(59,172,210,0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-color: rgba(255,255,255,0.3);
  color: #fff;
  box-shadow: 0 2px 12px rgba(59,172,210,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
}

/* スケジュール行 */
.sched-list { display: flex; flex-direction: column; gap: 9px; }

.sched-item {
  background: rgba(255,255,255,0.48);
  border: 1px solid rgba(255,255,255,0.75);
  border-left: 3px solid var(--sea1);
  border-radius: 0 14px 14px 0;
  padding: 10px 10px 8px 12px;
  display: grid;
  grid-template-columns: 62px 1fr;
  gap: 6px 8px;
  align-items: start;
  position: relative;
}
/* 編集モード時 */
.sched-edit-mode .sched-item {
  background: rgba(255,255,255,0.62);
  border-color: rgba(30,120,170,0.3);
}

/* ↑↓ボタン共通 */
.btn-move {
  background: rgba(255,255,255,0.55);
  border: 1px solid rgba(30,120,170,0.18);
  border-radius: 50%;
  width: 28px; height: 28px; min-width: 28px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 0.75rem;
  color: var(--textsub);
  transition: background 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
  line-height: 1;
}
.btn-move:active { background: rgba(91,191,224,0.25); color: var(--deep); }
.btn-move:disabled { opacity: 0.25; cursor: default; }

input[type="time"].sched-time {
  color: var(--sea2);
  font-weight: 600;
  font-size: 16px;
  height: 36px;
  line-height: 36px;
  padding: 0 2px;
  border-bottom: 1.5px solid rgba(30,120,170,0.2);
  background: transparent;
  border-top: none; border-left: none; border-right: none;
  outline: none;
  width: 100%;
  display: block;
}
.sched-time-view {
  color: var(--sea2);
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 16px;
  height: 36px;
  line-height: 36px;
  display: block;
  white-space: nowrap;
}

.sched-ta {
  resize: none;
  height: 36px;
  min-height: 36px;
  max-height: 400px;
  line-height: 1.5;
  padding: 6px 2px;
  overflow-y: hidden;
  display: block;
  font-size: 16px;
}
.sched-content-view {
  font-size: 16px;
  color: var(--text);
  line-height: 1.55;
  padding: 6px 2px;
  min-height: 36px;
  word-break: break-all;
  white-space: pre-wrap;
}

.sched-memo-wrap {
  grid-column: 1 / -1;
  margin-top: 4px;
}
.sched-memo-ta {
  resize: none;
  width: 100%;
  min-height: 56px;
  max-height: 300px;
  overflow-y: hidden;
  background: rgba(255,255,255,0.35);
  border: 1px dashed rgba(30,120,170,0.3);
  border-radius: 8px;
  padding: 7px 10px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.8rem;
  color: var(--text);
  line-height: 1.5;
  outline: none;
}
.sched-memo-ta::placeholder { color: rgba(30,100,140,0.35); }
.sched-memo-view {
  background: rgba(255,255,255,0.28);
  border: 1px dashed rgba(30,120,170,0.25);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 0.78rem;
  color: var(--textsub);
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-all;
}

.sched-btns {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: row;
  gap: 7px;
  align-items: center;
  justify-content: flex-end;
  padding-top: 6px;
  border-top: 1px solid rgba(30,120,170,0.08);
  margin-top: 2px;
}
.btn-memo {
  background: rgba(255,255,255,0.45);
  border: 1px solid rgba(30,120,170,0.18);
  border-radius: 50%;
  width: 32px; height: 32px; min-width: 32px;
  font-size: 0.9rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-memo:active { background: rgba(255,217,61,0.25); }

.add-center { display: flex; justify-content: center; gap: 10px; margin-top: 14px; }

.sched-edit-mode .sched-item {
  background: rgba(255,255,255,0.62);
  border-color: rgba(30,120,170,0.3);
}

/* ===== 持ち物 ===== */
.cat-scroll {
  display: flex; gap: 7px;
  overflow-x: auto; padding-bottom: 10px; margin-bottom: 12px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-chip {
  flex-shrink: 0;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 50px;
  padding: 7px 15px;
  color: rgba(255,255,255,0.6);
  font-family: 'Nunito', sans-serif;
  font-size: 0.78rem; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  min-height: 36px; display: flex; align-items: center;
}
.cat-chip.active {
  background: rgba(59,172,210,0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-color: rgba(255,255,255,0.3);
  color: #fff;
  box-shadow: 0 2px 12px rgba(59,172,210,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
}
.pack-badge {
  font-family: 'Nunito', sans-serif;
  font-size: 0.72rem; font-weight: 700;
  color: var(--textsub);
  background: rgba(255,255,255,0.45);
  border: 1px solid rgba(255,255,255,0.7);
  border-radius: 50px; padding: 3px 11px;
}
.pack-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.pack-item {
  background: rgba(255,255,255,0.48);
  border: 1px solid rgba(255,255,255,0.72);
  border-radius: 12px;
  padding: 8px 12px;
  display: flex; align-items: center; gap: 10px;
  min-height: 38px; transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.pack-item.checked { background: rgba(91,191,224,0.18); border-color: rgba(91,191,224,0.4); }
.pack-cb { width:20px;height:20px;min-width:20px;accent-color:var(--sea2);cursor:pointer; }
.pack-label { flex:1;font-size:0.88rem;color:var(--text);cursor:pointer; }
.pack-item.checked .pack-label { text-decoration:line-through;color:var(--textsub); }
.add-pack-row { display:flex;gap:8px; }
.add-pack-sel {
  background: rgba(255,255,255,0.55);
  border: 1.5px solid rgba(255,255,255,0.8);
  border-radius: 12px;
  padding: 0 10px; color: var(--text);
  font-family: 'Noto Sans JP',sans-serif;
  font-size: 0.8rem; outline: none;
  -webkit-appearance: none; min-height: 44px;
}
.add-pack-sel option { background:#e8f8fd;color:var(--text); }

/* ===== 行き先メモ ===== */
.spots-list { display:flex;flex-direction:column;gap:12px; }
.spot-card {
  background: rgba(255,255,255,0.48);
  border: 1.5px solid rgba(255,255,255,0.78);
  border-radius: var(--r); padding:14px;
  position:relative;overflow:hidden;
  box-shadow: 0 4px 18px rgba(30,120,170,0.1);
}
.spot-accent { position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--r) var(--r) 0 0; }
.spot-name-inp { font-size:0.96rem;font-weight:600;margin-bottom:8px;margin-top:8px; }
.spot-addr-inp { font-size:0.8rem;margin-bottom:8px;color:var(--textsub)!important; }
.spot-addr-inp::placeholder { color:rgba(74,138,170,0.38)!important; }
.spot-types { display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px; }
.spot-type-tag {
  background:rgba(255,255,255,0.55);
  border:1.5px solid rgba(30,120,170,0.18);
  border-radius:50px;padding:4px 12px;
  font-family:'Nunito',sans-serif;font-size:0.73rem;font-weight:700;
  color:var(--textsub);cursor:pointer;transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.spot-type-tag.active { background:var(--deep);border-color:var(--deep);color:white; }
.spot-memo-inp { font-size:0.82rem;resize:none;height:52px;margin-bottom:8px; }
.spot-foot { display:flex;justify-content:flex-end;align-items:center;margin-top:8px; }
.spot-foot-right { display:flex;gap:6px;align-items:center; }

/* コピー完了トースト */
.copy-toast {
  position: fixed;
  bottom: calc(28px + env(safe-area-inset-bottom, 0px));
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: rgba(26,122,168,0.92);
  color: white;

  <div class="panel" id="panel-spots">
    <div class="spots-list" id="spots-list">
      <div class="empty"><div class="ico">📍</div>行きたい場所を追加しよう</div>
    </div>
    <div class="add-center" style="margin-top:14px;">
      <button class="btn-add" onclick="addSpot()">＋ スポットを追加</button>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-ov" id="modal" onclick="closeOut(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">✈️ 旅行の概要</div>
    <div class="modal-fields">
      <div class="modal-field"><label>目的地</label><input class="f-inp" type="text" id="dest" placeholder="例: 沖縄・石垣島" oninput="updateHdr()"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div class="modal-field"><label>出発日</label><input class="f-inp" type="date" id="start-date" oninput="updateHdr();syncDays()"></div>
        <div class="modal-field"><label>帰着日</label><input class="f-inp" type="date" id="end-date" oninput="updateHdr();syncDays()"></div>
      </div>
      <div class="modal-field"><label>メンバー</label><input class="f-inp" type="text" id="members" placeholder="例: 大人2名 子1名" oninput="updateHdr()"></div>
      <div class="modal-field"><label>宿泊先</label><input class="f-inp" type="text" id="hotel" placeholder="例: ○○ホテル" oninput="updateHdr()"></div>
      <div class="modal-field"><label>メモ</label><input class="f-inp" type="text" id="trip-memo" placeholder="例: 夏休み旅行"></div>
    </div>
    <div class="modal-btm"><button class="btn-done" onclick="closeModal()">完了 ✓</button></div>
  </div>
</div>

<script>
// ============================================================
// Firebase 初期化（compat版）
// ============================================================
let _auth, _db;

function initFirebase() {
  if (typeof firebase === 'undefined') {
    setTimeout(initFirebase, 100);
    return;
  }
  if (firebase.apps.length === 0) {
    firebase.initializeApp({
      apiKey: "AIzaSyBkqPU9eB8SJImlv5LM2eq1DQQs9ALCBj4",
      authDomain: "travel-planning-bdef5.firebaseapp.com",
      projectId: "travel-planning-bdef5",
      storageBucket: "travel-planning-bdef5.firebasestorage.app",
      messagingSenderId: "147099236864",
      appId: "1:147099236864:web:4e2f3d7562ba549d8376e5"
    });
  }
  _auth = firebase.auth();
  _db   = firebase.firestore();

  _auth.onAuthStateChanged(async user => {
    if (user) {
      window._currentUser = user;
      const userRef = _db.collection('users').doc(user.uid);
      const userSnap = await userRef.get();
      const displayName = user.displayName || user.email;
      if (!userSnap.exists) {
        await userRef.set({
          displayName,
          email: user.email,
          isAdmin: false,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      } else if (user.displayName && userSnap.data().displayName !== user.displayName) {
        await userRef.update({ displayName: user.displayName });
      }

      const lastScreen    = localStorage.getItem('lastScreen')    || 'group';
      const lastGroupId   = localStorage.getItem('lastGroupId')   || '';
      const lastGroupName = localStorage.getItem('lastGroupName') || '';
      const lastTripId    = localStorage.getItem('lastTripId')    || '';
      const lastTripName  = localStorage.getItem('lastTripName')  || '';

      if (lastScreen === 'app' && lastTripId && lastGroupId) {
        _currentGroupId   = lastGroupId;
        _currentGroupName = lastGroupName;
        _currentTripId    = lastTripId;
        _currentTripName  = lastTripName;
        document.getElementById('trips-group-name').textContent = lastGroupName;
        try {
          const tripSnap = await _db.collection('trips').doc(lastTripId).get();
          if (tripSnap.exists) {
            const data = tripSnap.data();
            schedData = data.scheduleData || {};
            spots     = data.spots        || [];
            document.getElementById('dest').value       = data.dest      || '';
            document.getElementById('start-date').value = data.startDate || '';
            document.getElementById('end-date').value   = data.endDate   || '';
            document.getElementById('members').value    = data.members   || '';
            document.getElementById('hotel').value      = data.hotel     || '';
            document.getElementById('trip-memo').value  = data.tripMemo  || '';
            updateHdr(); syncDays();
            const uid = user.uid;
            const uSnap = await _db.collection('users').doc(uid).get();
            _myFamilyName = uSnap.exists ? (uSnap.data().familyName || '') : '';
            _currentTripPackingRef = _db
              .collection('trips').doc(lastTripId)
              .collection('packing').doc(_myFamilyName || uid);
            const packSnap = await _currentTripPackingRef.get();
            packItems = packSnap.exists ? (packSnap.data().items || []) : [...DEF_PACKS];
            showScreen('app');
            renderDays(); renderPack(); renderSpots();
            const famLabel = document.getElementById('family-label');
            if (famLabel) famLabel.textContent = _myFamilyName ? `${_myFamilyName}家 の持ち物` : '持ち物リスト';
          } else {
            showScreen('group'); loadGroups();
          }
        } catch(e) {
          console.error('restore error:', e);
          showScreen('group'); loadGroups();
        }

      } else if (lastScreen === 'trips' && lastGroupId) {
        _currentGroupId   = lastGroupId;
        _currentGroupName = lastGroupName;
        document.getElementById('trips-group-name').textContent = lastGroupName;
        showScreen('trips');
        loadTrips();

      } else {
        showScreen('group');
        loadGroups();
      }

    } else {
      window._currentUser = null;
      localStorage.removeItem('lastScreen');
      localStorage.removeItem('lastGroupId');
      localStorage.removeItem('lastGroupName');
      localStorage.removeItem('lastTripId');
      localStorage.removeItem('lastTripName');
      showScreen('login');
    }
  });
}

// === STATE ===
let curDay=1, totalDays=1;
let schedData={}, packItems=[], spots=[], catFilter='all';
let _myFamilyName = '';
let _currentTripPackingRef = null;

const SPOT_ACCENTS=[
  'linear-gradient(90deg,#5bbfe0,#2ea3cc)',
  'linear-gradient(90deg,#9eddf5,#5bbfe0)',
  'linear-gradient(90deg,#2ea3cc,#1a7aa8)',
  'linear-gradient(90deg,#74c8e8,#2ea3cc)',
  'linear-gradient(90deg,#aae8f8,#5bbfe0)',
];
const SPOT_TYPES=[];

// ヘッダー高さを動的に取得してscroll-areaのpadding-topを調整
function adjustScrollPadding() {
  const hdr = document.getElementById('hdr');
  const sa = document.getElementById('scroll-area');
  if (hdr && sa) {
    sa.style.paddingTop = (hdr.offsetHeight + 8) + 'px';
  }
}
window.addEventListener('resize', adjustScrollPadding);
document.fonts.ready.then(adjustScrollPadding);

// === MODAL ===
function openModal(){ document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); adjustScrollPadding(); saveTrip(); }
function closeOut(e){ if(e.target===document.getElementById('modal')) closeModal(); }

// === HEADER / OVERVIEW BAR ===
function updateHdr(){
  const dest = document.getElementById('dest').value;
  const s    = document.getElementById('start-date').value;
  const e    = document.getElementById('end-date').value;

  document.getElementById('ov-dest').textContent = dest || '目的地を設定する';

  const divider = document.getElementById('ov-divider');
  if(s && e){
    const sd=new Date(s), ed=new Date(e), d=Math.ceil((ed-sd)/86400000)+1;
    document.getElementById('ov-dates').textContent =
      `${sd.getMonth()+1}/${sd.getDate()} 〜 ${ed.getMonth()+1}/${ed.getDate()}（${d}日間）`;
    divider.style.display = 'block';
  } else {
    document.getElementById('ov-dates').textContent = '';
    divider.style.display = 'none';
  }

  adjustScrollPadding();
}

function syncDays(){
  const s=document.getElementById('start-date').value, e=document.getElementById('end-date').value;
  if(!s||!e) return;
  totalDays=Math.max(1,Math.ceil((new Date(e)-new Date(s))/86400000)+1);
  renderDays();
}

// === SCHEDULE ===
function renderDays(){
  const sel=document.getElementById('day-selector'); sel.innerHTML='';
  const sd=document.getElementById('start-date').value;
  for(let i=1;i<=totalDays;i++){
    const c=document.createElement('div'); c.className='day-chip'+(i===curDay?' active':'');
    let label=`Day ${i}`;
    if(sd){ const d=new Date(sd); d.setDate(d.getDate()+i-1); label=`${d.getMonth()+1}/${d.getDate()}`; }
    c.textContent=label; c.onclick=()=>{curDay=i;renderDays();renderSched();};
    sel.appendChild(c);
  }
  renderSched();
}

function linkify(text) {
  if (!text) return '';
  const escaped = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return escaped.replace(
    /(https?:\/\/[^\s　、。，．「」<>"]+)/g,
    '<a href="$1" target="_blank" rel="noopener noreferrer" style="color:var(--sea2);text-decoration:underline;word-break:break-all;">$1</a>'
  );
}

let _saveTripTimer = null;
function saveTripDebounced() {
  clearTimeout(_saveTripTimer);
  _saveTripTimer = setTimeout(() => saveTrip(), 1500);
}

let schedEditMode = false;

function toggleEditMode() {
  schedEditMode = !schedEditMode;
  const btn = document.getElementById('btn-edit-sched');
  const addBtn = document.getElementById('btn-add-sched');
  if (schedEditMode) {
    btn.textContent = '✅ 完了';
    btn.style.background = 'rgba(91,191,224,0.28)';
    btn.style.borderColor = 'rgba(46,163,204,0.6)';
    addBtn.style.display = 'flex';
  } else {
    btn.textContent = '✏️ 編集';
    btn.style.background = 'rgba(46,163,204,0.18)';
    btn.style.borderColor = 'rgba(46,163,204,0.45)';
    saveTrip();
  }
  renderSched();
}

function addSched(){
  if (!schedEditMode) return;
  if(!schedData[curDay]) schedData[curDay]=[];
  schedData[curDay].push({time:'',content:'',memo:'',memoOpen:false});
  renderSched();
  saveTrip();
  setTimeout(()=>{
    const tas = document.querySelectorAll('.sched-ta');
    if(tas.length) tas[tas.length-1].focus();
  }, 50);
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function toggleMemo(day, idx) {
  schedData[day][idx].memoOpen = !schedData[day][idx].memoOpen;
  renderSched();
  if (schedData[day][idx].memoOpen) {
    setTimeout(()=>{
      const memos = document.querySelectorAll('.sched-memo-ta');
      if(memos.length) memos[memos.length-1].focus();
    }, 50);
  }
}

function renderSched(){
  const list=document.getElementById('sched-list'), items=schedData[curDay]||[];
  const addBtn = document.getElementById('btn-add-sched');
  if(addBtn) addBtn.style.display = schedEditMode ? 'flex' : 'none';

  if(!items.length){
    list.innerHTML='<div class="empty"><div class="ico">🌅</div>予定を追加しよう</div>';
    return;
  }
  list.className = 'sched-list' + (schedEditMode ? ' sched-edit-mode' : '');
  list.innerHTML='';

  items.forEach((item,idx)=>{
    const d = document.createElement('div');
    d.className = 'sched-item';

    if (schedEditMode) {
      const isFirst = idx === 0;
      const isLast  = idx === items.length - 1;
      d.innerHTML = `
        <input class="l-inp sched-time" type="time" value="${item.time||''}"
          oninput="schedData[${curDay}][${idx}].time=this.value;saveTripDebounced()">
        <textarea class="l-inp sched-ta" placeholder="予定を入力"
          oninput="schedData[${curDay}][${idx}].content=this.value;autoResize(this);saveTripDebounced()">${item.content||''}</textarea>
        ${item.memoOpen ? `<div class="sched-memo-wrap">
          <textarea class="sched-memo-ta" placeholder="備考・メモを入力"
            oninput="schedData[${curDay}][${idx}].memo=this.value;autoResize(this);saveTripDebounced()">${item.memo||''}</textarea>
        </div>` : (item.memo ? `<div class="sched-memo-wrap"><div class="sched-memo-view">${item.memo}</div></div>` : '')}
        <div class="sched-btns">
          <button class="btn-move" onclick="moveSchedUp(${idx})" ${isFirst?'disabled':''} title="上へ">▲</button>
          <button class="btn-move" onclick="moveSchedDown(${idx})" ${isLast?'disabled':''} title="下へ">▼</button>
          <button class="btn-del" onclick="delSched(${idx})" title="削除">×</button>
          <button class="btn-memo" onclick="toggleMemo(${curDay},${idx})" title="メモ">📝</button>
        </div>
      `;
    } else {
      const timeLabel = item.time || '──:──';
      const contentHtml = item.content ? linkify(item.content) : '<span style="color:rgba(30,100,140,0.35)">（予定なし）</span>';
      const memoHtml = item.memo ? linkify(item.memo) : '';
      d.innerHTML = `
        <span class="sched-time-view">${timeLabel}</span>
        <div class="sched-content-view">${contentHtml}</div>
        ${memoHtml ? `<div class="sched-memo-wrap" style="grid-column:1/-1"><div class="sched-memo-view">${memoHtml}</div></div>` : ''}
      `;
    }
    list.appendChild(d);
  });

  if (schedEditMode) {
    list.querySelectorAll('.sched-ta').forEach(ta => autoResize(ta));
    list.querySelectorAll('.sched-memo-ta').forEach(ta => autoResize(ta));
  }
}

function moveSchedUp(idx) {
  const arr = schedData[curDay];
  if (idx === 0) return;
  [arr[idx-1], arr[idx]] = [arr[idx], arr[idx-1]];
  renderSched(); saveTripDebounced();
}
function moveSchedDown(idx) {
  const arr = schedData[curDay];
  if (idx === arr.length - 1) return;
  [arr[idx], arr[idx+1]] = [arr[idx+1], arr[idx]];
  renderSched(); saveTripDebounced();
}

function delSched(idx){
  if(!confirm('この予定を削除しますか？')) return;
  schedData[curDay].splice(idx,1);
  renderSched(); saveTrip();
}

// === PACKING ===
const DEF_PACKS=[
  {name:'財布・現金',cat:'その他',checked:false},{name:'クレジットカード',cat:'その他',checked:false},
  {name:'身分証明書',cat:'その他',checked:false},{name:'スマートフォン',cat:'電子機器',checked:false},
  {name:'充電器',cat:'電子機器',checked:false},{name:'モバイルバッテリー',cat:'電子機器',checked:false},
  {name:'着替え（上）',cat:'衣類',checked:false},{name:'着替え（下）',cat:'衣類',checked:false},
  {name:'パジャマ',cat:'衣類',checked:false},{name:'歯ブラシ',cat:'洗面',checked:false},
  {name:'シャンプー',cat:'洗面',checked:false},{name:'常備薬',cat:'その他',checked:false},
];
packItems=[...DEF_PACKS];

function renderPack(){
  const list=document.getElementById('pack-list');
  const filtered=catFilter==='all'?packItems:packItems.filter(p=>p.cat===catFilter);
  const ck=packItems.filter(p=>p.checked).length;
  document.getElementById('pack-count').textContent=`${ck} / ${packItems.length} 完了`;
  if(!filtered.length){ list.innerHTML='<div class="empty" style="padding:16px 0"><div class="ico">📦</div>このカテゴリは空です</div>'; return; }
  list.innerHTML='';
  filtered.forEach(item=>{
    const ri=packItems.indexOf(item), d=document.createElement('div');
    d.className='pack-item'+(item.checked?' checked':'');
    d.innerHTML=`<input class="pack-cb" type="checkbox" ${item.checked?'checked':''} onchange="togglePack(${ri})">
<span class="pack-label" onclick="togglePack(${ri})">${item.name}</span>
<button class="btn-del" onclick="delPack(${ri})">×</button>`;
    list.appendChild(d);
  });
}
function togglePack(i){ packItems[i].checked=!packItems[i].checked; renderPack(); savePacking(); }
function delPack(i){ packItems.splice(i,1); renderPack(); savePacking(); }
function filterCat(cat,el){
  catFilter=cat;
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active'); renderPack();
}
function addPack(){
  const inp=document.getElementById('new-pack'), cat=document.getElementById('new-pack-cat').value;
  if(!inp.value.trim()) return;
  packItems.push({name:inp.value.trim(),cat,checked:false}); inp.value=''; renderPack(); savePacking();
}

// === SPOTS ===
let spotEditMode = {};

function addSpot(){
  spots.push({name:'',address:'',memo:''});
  spotEditMode[spots.length-1] = true;
  renderSpots();
  saveTrip();
}

function toggleSpotEdit(idx) {
  spotEditMode[idx] = !spotEditMode[idx];
  renderSpots();
  if (!spotEditMode[idx]) saveTrip();
}

const COPY_ICON = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const CHECK_ICON = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

let _toastTimer = null;
function showCopyToast() {
  let toast = document.getElementById('copy-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'copy-toast';
    toast.className = 'copy-toast';
    toast.textContent = '住所をコピーしました';
    document.body.appendChild(toast);
  }
  clearTimeout(_toastTimer);
  toast.classList.add('show');
  _toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

function copyAddress(idx) {
  const addr = spots[idx].address;
  if (!addr) { alert('住所が入力されていません'); return; }
  const btn = document.querySelector(`[data-copy-idx="${idx}"]`);
  const doFeedback = () => {
    if (btn) {
      btn.innerHTML = CHECK_ICON;
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = COPY_ICON;
        btn.classList.remove('copied');
      }, 2000);
    }
    showCopyToast();
  };
  navigator.clipboard.writeText(addr).then(doFeedback).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = addr;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    doFeedback();
  });
}

function renderSpots(){
  const list=document.getElementById('spots-list');
  if(!spots.length){ list.innerHTML='<div class="empty"><div class="ico">📍</div>行きたい場所を追加しよう</div>'; return; }
  list.innerHTML='';
  spots.forEach((sp,idx)=>{
    const d=document.createElement('div'); d.className='spot-card';
    const acc=SPOT_ACCENTS[idx%SPOT_ACCENTS.length];
    const isEdit = spotEditMode[idx] === true;

    if (isEdit) {
      d.innerHTML=`
        <div class="spot-accent" style="background:${acc}"></div>
        <input class="l-inp spot-name-inp" type="text" placeholder="スポット名" value="${sp.name}"
          oninput="spots[${idx}].name=this.value;saveTripDebounced()">
        <input class="l-inp spot-addr-inp" type="text" placeholder="住所（マップアプリ用）" value="${sp.address}"
          oninput="spots[${idx}].address=this.value;saveTripDebounced()">
        <textarea class="l-inp spot-memo-inp" placeholder="メモ（営業時間・料金など）"
          oninput="spots[${idx}].memo=this.value;saveTripDebounced()">${sp.memo}</textarea>
        <div class="spot-foot">
          <button class="btn-del-text" onclick="delSpot(${idx})">削除</button>
          <button class="btn-del-text" onclick="toggleSpotEdit(${idx})"
            style="background:rgba(46,163,204,0.15);border-color:rgba(46,163,204,0.35);color:var(--deep);">✅ 完了</button>
        </div>`;
    } else {
      const nameHtml  = sp.name    || '<span style="color:rgba(30,100,140,0.35)">スポット名未入力</span>';
      const addrHtml  = sp.address || '<span style="color:rgba(30,100,140,0.35)">住所未入力</span>';
      const memoHtml  = sp.memo    ? `<div style="font-size:0.8rem;color:var(--textsub);margin-top:6px;line-height:1.5;">${linkify(sp.memo)}</div>` : '';
      const isFirst = idx === 0;
      const isLast  = idx === spots.length - 1;
      d.innerHTML=`
        <div class="spot-accent" style="background:${acc}"></div>
        <div style="font-size:16px;font-weight:600;color:var(--text);padding:4px 2px 2px;">${nameHtml}</div>
        <div style="font-size:0.82rem;color:var(--textsub);padding:2px;">${addrHtml}</div>
        ${memoHtml}
        <div class="spot-foot">
          <div class="spot-foot-right">
            <button class="btn-move" onclick="moveSpotUp(${idx})" ${isFirst?'disabled':''} title="上へ">▲</button>
            <button class="btn-move" onclick="moveSpotDown(${idx})" ${isLast?'disabled':''} title="下へ">▼</button>
            <button class="btn-copy-addr" data-copy-idx="${idx}" onclick="copyAddress(${idx})" title="住所をコピー">${COPY_ICON}</button>
            <button class="btn-del-text" onclick="toggleSpotEdit(${idx})">✏️ 編集</button>
            <button class="btn-del-text" onclick="delSpot(${idx})">削除</button>
          </div>
        </div>`;
    }
    list.appendChild(d);
  });
}

function moveSpotUp(idx) {
  if (idx === 0) return;
  [spots[idx-1], spots[idx]] = [spots[idx], spots[idx-1]];
  spotEditMode = {};
  renderSpots(); saveTripDebounced();
}
function moveSpotDown(idx) {
  if (idx === spots.length - 1) return;
  [spots[idx], spots[idx+1]] = [spots[idx+1], spots[idx]];
  spotEditMode = {};
  renderSpots(); saveTripDebounced();
}

function delSpot(idx){
  if(!confirm('このスポットを削除しますか？')) return;
  spots.splice(idx,1);
  const newMode = {};
  Object.keys(spotEditMode).forEach(k => {
    const ki = parseInt(k);
    if (ki < idx) newMode[ki] = spotEditMode[ki];
    else if (ki > idx) newMode[ki-1] = spotEditMode[ki];
  });
  spotEditMode = newMode;
  renderSpots(); saveTrip();
}

// === TABS ===
function showTab(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
  window.scrollTo({top:0});
}

let _pdfFontLoaded = false;

async function exportPDF(){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'});

  // 日本語フォント登録（初回のみ）
  if(!_pdfFontLoaded){
    doc.addFileToVFS('NotoSansJP-Regular.ttf', NOTO_SANS_JP_B64);
    doc.addFont('NotoSansJP-Regular.ttf', 'NotoSansJP', 'normal');
    _pdfFontLoaded = true;
  } else {
    doc.addFileToVFS('NotoSansJP-Regular.ttf', NOTO_SANS_JP_B64);
    doc.addFont('NotoSansJP-Regular.ttf', 'NotoSansJP', 'normal');
  }
  const JA = 'NotoSansJP';

  const dest=document.getElementById('dest').value||'旅行';
  const s=document.getElementById('start-date').value, e=document.getElementById('end-date').value;
  const members=document.getElementById('members').value, hotel=document.getElementById('hotel').value, memo=document.getElementById('trip-memo').value;
  const W=210,H=297,M=14; let y=M;

  // ヘッダー帯
  doc.setFillColor(30,120,168);doc.rect(0,0,W,22,'F');
  doc.setFillColor(91,191,224);doc.rect(0,19,W,3,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(16);
  doc.text('TRAVEL Planning',M,13);
  doc.setFont(JA,'normal');doc.setFontSize(9);doc.text(dest,W-M,13,{align:'right'});

  // 概要ボックス
  y=30;
  doc.setFillColor(232,248,253);doc.roundedRect(M,y,W-M*2,34,3,3,'F');
  doc.setTextColor(26,74,96);doc.setFont('helvetica','bold');doc.setFontSize(9);doc.text('OVERVIEW',M+4,y+7);
  doc.setFont(JA,'normal');doc.setFontSize(8.5);doc.setTextColor(30,80,110);
  const ov=[
    `目的地: ${dest||'-'}`,
    `期間: ${s||'-'} 〜 ${e||'-'}`,
    `メンバー: ${members||'-'}`,
    `宿泊先: ${hotel||'-'}`,
    memo?`メモ: ${memo}`:'',
  ].filter(Boolean);
  ov.forEach((l,i)=>{const col=i<3?0:1;doc.text(l,M+4+col*(W-M*2)/2,y+13+(i%3)*6.5);});
  y+=42;

  function chk(n=10){if(y+n>H-M){doc.addPage();y=M;}}
  function sec(t){chk(12);doc.setFillColor(91,191,224);doc.rect(M,y,3,8,'F');doc.setTextColor(26,74,96);doc.setFont(JA,'normal');doc.setFontSize(10);doc.text(t,M+6,y+5.5);y+=13;}
  function bln(txt,ind=0){chk(7);doc.setFont(JA,'normal');doc.setFontSize(8.5);doc.setTextColor(30,80,110);doc.splitTextToSize(txt,W-M*2-ind-6).forEach(l=>{chk(6);doc.text(l,M+ind+4,y);y+=5.5;});}
  function hr(){doc.setDrawColor(180,225,240);doc.setLineWidth(0.3);doc.line(M,y,W-M,y);y+=5;}

  // 日程表
  sec('日程表');
  const hasSch=Object.values(schedData).some(d=>d.length>0);
  if(!hasSch){bln('予定がありません。');}
  else{
    for(let d=1;d<=totalDays;d++){
      const items=schedData[d]||[];if(!items.length)continue;
      chk(10);
      const sd=document.getElementById('start-date').value;
      let dayLabel=`Day ${d}`;
      if(sd){const dt=new Date(sd);dt.setDate(dt.getDate()+d-1);dayLabel=`${d}日目 (${dt.getMonth()+1}/${dt.getDate()})`;}
      doc.setFillColor(220,244,252);doc.roundedRect(M+2,y-1,50,7,2,2,'F');
      doc.setTextColor(26,74,96);doc.setFont(JA,'normal');doc.setFontSize(8.5);doc.text(dayLabel,M+6,y+4);y+=9;
      items.forEach(item=>{
        chk(7);
        const txt=(item.time?`[${item.time}] `:'')+(item.content||'（予定なし）');
        doc.setFont(JA,'normal');doc.setFontSize(8.5);doc.setTextColor(30,80,110);
        doc.setFillColor(91,191,224);doc.circle(M+7,y-1.5,1.5,'F');
        doc.splitTextToSize(txt,W-M*2-12).forEach(l=>{doc.text(l,M+12,y);y+=5.5;});
        if(item.memo){
          doc.setFontSize(7.5);doc.setTextColor(100,140,160);
          doc.splitTextToSize(item.memo,W-M*2-16).forEach(l=>{chk(5);doc.text(l,M+14,y);y+=5;});
        }
      });
      y+=3;
    }
  }
  hr();

  // 持ち物
  sec('持ち物リスト');
  const cats=[...new Set(packItems.map(p=>p.cat))];
  cats.forEach(cat=>{
    const items=packItems.filter(p=>p.cat===cat);
    chk(8);
    doc.setFont(JA,'normal');doc.setFontSize(8.5);doc.setTextColor(26,74,96);
    doc.text(cat,M+4,y);y+=6;
    const cols=3,colW=(W-M*2-8)/cols;
    items.forEach((item,i)=>{
      const col=i%cols,row=Math.floor(i/cols);
      if(col===0&&row>0){y+=6;chk(6);}
      const cx=M+6+col*colW,cy=y;
      doc.setFont(JA,'normal');doc.setFontSize(8);doc.setTextColor(30,80,110);
      doc.setDrawColor(91,150,180);doc.rect(cx,cy-3.5,3.5,3.5);
      if(item.checked){doc.setDrawColor(91,191,224);doc.line(cx,cy-2,cx+1.5,cy-0.5);doc.line(cx+1.5,cy-0.5,cx+3.5,cy-3.5);}
      doc.text(item.name,cx+5,cy-0.5);
    });
    y+=Math.ceil(items.length/cols)*6+4;
  });
  hr();

  // 行き先
  sec('行き先メモ');
  if(!spots.length){bln('スポットがありません。');}
  else{
    spots.forEach(sp=>{
      chk(16);
      doc.setFont(JA,'normal');doc.setFontSize(9);doc.setTextColor(26,74,96);
      doc.text(sp.name||'（名前未入力）',M+4,y);y+=5.5;
      if(sp.address){doc.setFont(JA,'normal');doc.setFontSize(8);doc.setTextColor(60,120,150);doc.text(sp.address,M+6,y);y+=5;}
      if(sp.memo){bln(sp.memo,4);}
      y+=2;
    });
  }

  // フッター
  const pc=doc.internal.getNumberOfPages();
  for(let i=1;i<=pc;i++){
    doc.setPage(i);
    doc.setDrawColor(91,191,224);doc.setLineWidth(0.5);doc.line(M,H-12,W-M,H-12);
    doc.setFont(JA,'normal');doc.setFontSize(7.5);doc.setTextColor(26,74,96);
    doc.text('TRAVEL Planning',M,H-7);
    doc.text(`${i} / ${pc}`,W-M,H-7,{align:'right'});
  }
  doc.save(`travel_${dest||'plan'}.pdf`);
}

window.showScreen = function showScreen(name, pushHistory = true) {
  document.querySelectorAll('.screen').forEach(s => {
    s.style.display = 'none';
    s.classList.remove('active');
  });
  const el = document.getElementById('screen-' + name);
  if (el) { el.style.display = 'block'; el.classList.add('active'); }
  if (name === 'app') requestAnimationFrame(adjustScrollPadding);

  if (name !== 'login') {
    localStorage.setItem('lastScreen',    name);
    localStorage.setItem('lastGroupId',   _currentGroupId   || '');
    localStorage.setItem('lastGroupName', _currentGroupName || '');
    localStorage.setItem('lastTripId',    _currentTripId    || '');
    localStorage.setItem('lastTripName',  _currentTripName  || '');
  }

  if (pushHistory) {
    const state = {
      screen:    name,
      groupId:   _currentGroupId   || '',
      groupName: _currentGroupName || '',
      tripId:    _currentTripId    || '',
      tripName:  _currentTripName  || '',
    };
    if (name !== 'login') {
      history.pushState(state, '', '#' + name);
    } else {
      history.replaceState(state, '', location.pathname);
    }
  }
};

function switchAuthTab(tab, btn) {
  document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('auth-form-login').style.display    = tab === 'login'    ? 'block' : 'none';
  document.getElementById('auth-form-register').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('auth-error').textContent = '';
}

function showAuthError(msg) {
  document.getElementById('auth-error').textContent = msg;
}

async function loginGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await _auth.signInWithPopup(provider);
  } catch(e) {
    if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
      try { await _auth.signInWithRedirect(provider); } catch(e2) { showAuthError('Googleログインに失敗しました'); }
    } else {
      showAuthError('Googleログインに失敗しました: ' + (e.message || ''));
    }
  }
}

async function loginEmail() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  if (!email || !pass) { showAuthError('メールとパスワードを入力してください'); return; }
  try {
    await _auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    showAuthError('メールアドレスまたはパスワードが違います');
  }
}

async function registerEmail() {
  const family = document.getElementById('reg-family').value.trim();
  const name   = document.getElementById('reg-name').value.trim();
  const email  = document.getElementById('reg-email').value.trim();
  const pass   = document.getElementById('reg-pass').value;
  if (!family || !name || !email || !pass) { showAuthError('すべての項目を入力してください'); return; }
  if (pass.length < 6) { showAuthError('パスワードは6文字以上にしてください'); return; }
  try {
    const displayName = `${family} ${name}`;
    const cred = await _auth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({ displayName });
    await cred.user.reload();
    window._currentUser = _auth.currentUser;
    await _db.collection('users').doc(cred.user.uid).set({
      displayName,
      familyName: family,
      email,
      isAdmin: false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) {
    if (e.code === 'auth/email-already-in-use') showAuthError('このメールアドレスは既に使われています');
    else showAuthError('登録に失敗しました: ' + e.message);
  }
}

async function doSignOut() {
  localStorage.removeItem('lastScreen');
  localStorage.removeItem('lastGroupId');
  localStorage.removeItem('lastGroupName');
  localStorage.removeItem('lastTripId');
  localStorage.removeItem('lastTripName');
  history.replaceState(null, '', location.pathname);
  await _auth.signOut();
}

// ============================================================
// グループ管理
// ============================================================
let _currentGroupId   = null;
let _currentGroupName = null;

window.loadGroups = async function loadGroups() {
  if (!window._currentUser) return;
  const uid = window._currentUser.uid;

  const userSnap = await _db.collection('users').doc(uid).get();
  const userData = userSnap.exists ? userSnap.data() : {};
  const isAdmin = userData.isAdmin === true;
  const displayName = userData.displayName || window._currentUser.displayName || window._currentUser.email;
  document.getElementById('user-hello').textContent = `こんにちは、${displayName} さん 👋`;

  const createSection = document.getElementById('create-group-section');
  if (createSection) createSection.style.display = isAdmin ? 'block' : 'none';

  const snap = await _db.collection('groups').where('members', 'array-contains', uid).get({ source: 'server' });
  const list = document.getElementById('group-list');
  if (snap.empty) {
    list.innerHTML = '<div class="empty"><div class="ico">👥</div>グループがありません<br>招待コードで参加してください</div>';
    return;
  }
  list.innerHTML = '';
  snap.forEach(docSnap => {
    const d = docSnap.data();
    const div = document.createElement('div');
    div.className = 'group-item';
    const codeRow = isAdmin ? `<div class="group-item-code">招待コード: <b>${d.inviteCode}</b></div>` : '';
    div.innerHTML = `
      <div>
        <div class="group-item-name">${d.name}</div>
        ${codeRow}
      </div>
      <div class="group-item-arrow">›</div>`;
    div.onclick = () => openGroup(docSnap.id, d.name);
    list.appendChild(div);
  });
};

function genCode(len=6) {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:len}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

async function createGroup() {
  const name = document.getElementById('new-group-name').value.trim();
  if (!name) { alert('グループ名を入力してください'); return; }
  const uid = window._currentUser.uid;
  const inviteCode = genCode();
  await _db.collection('groups').add({
    name, inviteCode,
    members: [uid],
    createdBy: uid,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  document.getElementById('new-group-name').value = '';
  loadGroups();
}

async function joinGroup() {
  const code = document.getElementById('invite-code-inp').value.trim().toUpperCase();
  if (!code) { alert('招待コードを入力してください'); return; }
  const uid = window._currentUser.uid;
  const snap = await _db.collection('groups').where('inviteCode', '==', code).get();
  if (snap.empty) { alert('招待コードが見つかりません'); return; }
  const groupDoc = snap.docs[0];
  const data = groupDoc.data();
  if (data.members.includes(uid)) { alert('すでにこのグループに参加しています'); return; }
  await _db.collection('groups').doc(groupDoc.id).update({
    members: firebase.firestore.FieldValue.arrayUnion(uid)
  });
  document.getElementById('invite-code-inp').value = '';
  alert(`「${data.name}」に参加しました！`);
  loadGroups();
}

async function openGroup(groupId, groupName) {
  _currentGroupId   = groupId;
  _currentGroupName = groupName;
  document.getElementById('trips-group-name').textContent = groupName;
  showScreen('trips');
  loadTrips();
}

// ============================================================
// 旅行一覧
// ============================================================
let _currentTripId = null;
let _currentTripName = '';

async function loadTrips() {
  if (!_currentGroupId) return;
  const list = document.getElementById('trip-list');
  list.innerHTML = '<div class="empty" style="padding:20px;opacity:0.7;">読み込み中...</div>';
  try {
    const snap = await _db.collection('trips').where('groupId', '==', _currentGroupId).get({ source: 'server' });
    if (snap.empty) {
      list.innerHTML = '<div class="empty"><div class="ico">✈️</div>旅行がありません<br>新しい旅行を作成してください</div>';
      return;
    }
    const trips = [];
    snap.forEach(docSnap => trips.push({ id: docSnap.id, ...docSnap.data() }));
    trips.sort((a, b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
    list.innerHTML = '';
    trips.forEach(d => {
      const div = document.createElement('div');
      div.className = 'trip-item';
      const date = d.createdAt ? new Date(d.createdAt.seconds*1000).toLocaleDateString('ja-JP') : '';
      const dest = d.dest ? ` · ${d.dest}` : '';
      const left = document.createElement('div');
      left.style.cssText = 'flex:1;min-width:0;';
      left.innerHTML = `
        <div class="trip-item-name">${d.name}</div>
        <div class="trip-item-date">${date}${dest}</div>`;

      const right = document.createElement('div');
      right.style.cssText = 'display:flex;align-items:center;gap:8px;flex-shrink:0;';

      const editBtn = document.createElement('button');
      editBtn.className = 'btn-trip-edit';
      editBtn.textContent = '✏️';
      editBtn.addEventListener('click', e => {
        e.stopPropagation();
        openRenameModal(d.id, d.name);
      });

      const arrow = document.createElement('div');
      arrow.className = 'trip-item-arrow';
      arrow.textContent = '›';

      right.appendChild(editBtn);
      right.appendChild(arrow);
      div.appendChild(left);
      div.appendChild(right);

      div.onclick = () => openTrip(d.id, d);
      list.appendChild(div);
    });
  } catch(e) {
    console.error('loadTrips error:', e);
    list.innerHTML = '<div class="empty"><div class="ico">⚠️</div>読み込みに失敗しました</div>';
  }
}

async function createTrip() {
  const name = document.getElementById('new-trip-name').value.trim();
  if (!name) { alert('旅行名を入力してください'); return; }
  const ref = await _db.collection('trips').add({
    name, groupId: _currentGroupId,
    createdBy: window._currentUser.uid,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    scheduleData: {}, packItems: [], spots: []
  });
  document.getElementById('new-trip-name').value = '';
  _currentTripName = name;
  openTrip(ref.id, { name, scheduleData:{}, packItems:[], spots:[] });
}

async function openTrip(tripId, data) {
  _currentTripId = tripId;
  _currentTripName = data.name || '';
  schedData  = data.scheduleData || {};
  spots      = data.spots        || [];
  totalDays  = 1; curDay = 1;
  schedEditMode = false;

  document.getElementById('dest').value       = data.dest      || '';
  document.getElementById('start-date').value = data.startDate || '';
  document.getElementById('end-date').value   = data.endDate   || '';
  document.getElementById('members').value    = data.members   || '';
  document.getElementById('hotel').value      = data.hotel     || '';
  document.getElementById('trip-memo').value  = data.tripMemo  || '';
  updateHdr(); syncDays();

  const uid = window._currentUser.uid;
  const userSnap = await _db.collection('users').doc(uid).get();
  _myFamilyName = userSnap.exists ? (userSnap.data().familyName || '') : '';

  _currentTripPackingRef = _db
    .collection('trips').doc(_currentTripId)
    .collection('packing').doc(_myFamilyName || uid);

  const packSnap = await _currentTripPackingRef.get();
  packItems = packSnap.exists ? (packSnap.data().items || []) : [...DEF_PACKS];

  showScreen('app');
  renderDays(); renderPack(); renderSpots();
  const famLabel = document.getElementById('family-label');
  if (famLabel) famLabel.textContent = _myFamilyName ? `${_myFamilyName}家 の持ち物` : '持ち物リスト';
}

async function saveTrip() {
  if (!_currentTripId || !_currentGroupId) return;
  try {
    await _db.collection('trips').doc(_currentTripId).set({
      groupId:      _currentGroupId,
      name:         _currentTripName,
      dest:         document.getElementById('dest').value,
      startDate:    document.getElementById('start-date').value,
      endDate:      document.getElementById('end-date').value,
      members:      document.getElementById('members').value,
      hotel:        document.getElementById('hotel').value,
      tripMemo:     document.getElementById('trip-memo').value,
      scheduleData: schedData,
      spots:        spots,
      createdBy:    window._currentUser?.uid || '',
      updatedAt:    firebase.firestore.FieldValue.serverTimestamp(),
    }, { merge: true });
  } catch(e) {
    console.error('saveTrip error:', e);
  }
}

async function savePacking() {
  if (!_currentTripPackingRef) return;
  try {
    await _currentTripPackingRef.set({
      items: packItems,
      familyName: _myFamilyName,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) {
    console.error('savePacking error:', e);
  }
}

// ============================================================
// 旅行名変更
// ============================================================
let _renameTripId = null;

function openRenameModal(tripId, currentName) {
  _renameTripId = tripId;
  document.getElementById('rename-input').value = currentName;
  document.getElementById('rename-overlay').classList.add('open');
  setTimeout(() => document.getElementById('rename-input').focus(), 100);
}

function closeRenameModal() {
  document.getElementById('rename-overlay').classList.remove('open');
  _renameTripId = null;
}

async function submitRename() {
  const newName = document.getElementById('rename-input').value.trim();
  if (!newName) { alert('旅行名を入力してください'); return; }
  if (!_renameTripId) return;
  try {
    await _db.collection('trips').doc(_renameTripId).update({
      name: newName,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    if (_currentTripId === _renameTripId) {
      _currentTripName = newName;
    }
    closeRenameModal();
    loadTrips();
  } catch(e) {
    console.error('rename error:', e);
    alert('変更に失敗しました');
  }
}

// ============================================================
// リロード
// ============================================================
function reloadCurrentScreen() {
  const btns = document.querySelectorAll('.btn-reload');
  btns.forEach(b => b.classList.add('spinning'));
  setTimeout(() => location.reload(), 400);
}

function backToTrips() {
  window.showScreen('trips');
  loadTrips();
}

// ============================================================
// ブラウザの戻る/進むボタン対応
// ============================================================
window.addEventListener('popstate', async e => {
  const state = e.state;
  if (!state || !state.screen) {
    if (window._currentUser) {
      window.showScreen('group', false);
      loadGroups();
    } else {
      window.showScreen('login', false);
    }
    return;
  }

  const { screen, groupId, groupName, tripId, tripName } = state;

  if (screen === 'group') {
    window.showScreen('group', false);
    loadGroups();

  } else if (screen === 'trips' && groupId) {
    _currentGroupId   = groupId;
    _currentGroupName = groupName;
    document.getElementById('trips-group-name').textContent = groupName;
    window.showScreen('trips', false);
    loadTrips();

  } else if (screen === 'app' && tripId) {
    _currentGroupId   = groupId;
    _currentGroupName = groupName;
    _currentTripId    = tripId;
    _currentTripName  = tripName;
    document.getElementById('trips-group-name').textContent = groupName;
    try {
      const tripSnap = await _db.collection('trips').doc(tripId).get();
      if (tripSnap.exists) {
        const data = tripSnap.data();
        schedData = data.scheduleData || {};
        spots     = data.spots        || [];
        document.getElementById('dest').value       = data.dest      || '';
        document.getElementById('start-date').value = data.startDate || '';
        document.getElementById('end-date').value   = data.endDate   || '';
        document.getElementById('members').value    = data.members   || '';
        document.getElementById('hotel').value      = data.hotel     || '';
        document.getElementById('trip-memo').value  = data.tripMemo  || '';
        updateHdr(); syncDays();
        const uid = window._currentUser.uid;
        const userSnap = await _db.collection('users').doc(uid).get();
        _myFamilyName = userSnap.exists ? (userSnap.data().familyName || '') : '';
        _currentTripPackingRef = _db
          .collection('trips').doc(tripId)
          .collection('packing').doc(_myFamilyName || uid);
        const packSnap = await _currentTripPackingRef.get();
        packItems = packSnap.exists ? (packSnap.data().items || []) : [...DEF_PACKS];
        window.showScreen('app', false);
        renderDays(); renderPack(); renderSpots();
        const famLabel = document.getElementById('family-label');
        if (famLabel) famLabel.textContent = _myFamilyName ? `${_myFamilyName}家 の持ち物` : '持ち物リスト';
      } else {
        window.showScreen('trips', false);
        loadTrips();
      }
    } catch(e) {
      console.error('popstate restore error:', e);
      window.showScreen('trips', false);
      loadTrips();
    }
  }
});
